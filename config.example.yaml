source:
  app_names:
    - 微信
    - WeChat

push:
  bark:
    enabled: true
    server: https://api.day.app
    key: your_bark_key
    group: wechat-notify
  wxpusher:
    enabled: false
    app_token: your_app_token
    uids:
      - your_uid

dedupe:
  ttl_seconds: 10

runtime:
  log_level: INFO
  poll_interval_seconds: 2
  use_mock_listener: true
  # Set to false on Windows to read live toast notifications instead of the built-in mock event.
